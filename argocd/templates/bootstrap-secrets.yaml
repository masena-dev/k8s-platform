{{- if .Values.components.bootstrapSecrets }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-secrets
  namespace: argocd
  annotations:
    # Depends on the ESO CRDs (-3) and the ClusterSecretStore (-2).
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: {{ .Values.repoURL }}
      targetRevision: {{ .Values.targetRevision }}
      path: values/bootstrap-secrets
      helm:
        valueFiles:
          - $values/clusters/{{ .Values.clusterName }}/bootstrap-secrets.yaml
        parameters:
          - name: secrets.grafanaAdmin.onepasswordItemUuid
            value: {{ .Values.onepasswordItemUuids.grafanaAdmin | quote }}
          - name: secrets.cloudflareApiToken.onepasswordItemUuid
            value: {{ .Values.onepasswordItemUuids.cloudflareApiToken | quote }}
          - name: secrets.grafanaOAuth.enabled
            value: {{ .Values.components.grafanaOAuth | quote }}
          - name: secrets.grafanaOAuth.onepasswordItemUuid
            value: {{ .Values.onepasswordItemUuids.grafanaOAuth | quote }}
          - name: secrets.argocdOidc.onepasswordItemUuid
            value: {{ .Values.onepasswordItemUuids.argocdOidc | quote }}
    - repoURL: {{ .Values.repoURL }}
      targetRevision: {{ .Values.targetRevision }}
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
{{- end }}
