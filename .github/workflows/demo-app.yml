name: Demo App Image

on:
  push:
    branches: [main]
    paths:
      - 'demo-app/**'
  workflow_dispatch:

concurrency:
  group: demo-app-build
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/k8s-platform-demo-app

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate tag
        id: tag
        run: |
          SHA_SHORT="${GITHUB_SHA:0:7}"
          echo "image_tag=main-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: demo-app
          file: demo-app/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Helm values
        if: github.repository == 'masena-dev/k8s-platform'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          FILE_PATH="values/demo-app/values.yaml"
          API="https://api.github.com/repos/${REPO}/contents/${FILE_PATH}"
          AUTH="Authorization: Bearer $GH_TOKEN"
          ACCEPT="Accept: application/vnd.github+json"

          resp=$(curl -sS -H "$AUTH" -H "$ACCEPT" "$API")
          sha=$(echo "$resp" | jq -r .sha)
          content=$(echo "$resp" | jq -r .content | base64 --decode)

          new_content=$(echo "$content" | sed "s/tag: .*/tag: \"$IMAGE_TAG\"/")

          if [ "$content" = "$new_content" ]; then
            echo "No update needed"
            exit 0
          fi

          b64=$(echo "$new_content" | base64 | tr -d '\n')
          payload=$(jq -n \
            --arg msg "chore: deploy demo-app $IMAGE_TAG" \
            --arg content "$b64" \
            --arg sha "$sha" \
            '{message:$msg,content:$content,sha:$sha}')

          curl -sS -X PUT -H "$AUTH" -H "$ACCEPT" "$API" -d "$payload"
          echo "Updated image tag to $IMAGE_TAG"
