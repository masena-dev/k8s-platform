name: Terraform Plan

on:
  pull_request:
    paths:
      - 'terraform/**'
      - 'argocd/**'
      - 'values/**'
      - '.github/workflows/terraform-plan.yml'
      - '.github/actions/terraform-validate/**'
      - '.github/scripts/create-validation-comment.js'

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.14.6"
  SUMMARY_FILE: "terraform-validation-summary.txt"

jobs:
  validate-cluster:
    name: Validate - Cluster (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cloud: ovh
            cluster_dir: terraform/clusters/ovh-starter/cluster
            label: "OVH Cluster"
          - cloud: hetzner
            cluster_dir: terraform/clusters/hetzner-starter/cluster
            label: "Hetzner Cluster"
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Validate ${{ matrix.label }}
        id: validate
        uses: ./.github/actions/terraform-validate
        with:
          label: ${{ matrix.label }}
          path: ${{ matrix.cluster_dir }}
          summary_file: ${{ env.SUMMARY_FILE }}

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-summary-cluster-${{ matrix.cloud }}
          path: validation-summary-*.txt
          if-no-files-found: ignore

  validate-addons:
    name: Validate - Addons (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cloud: ovh
            addons_dir: terraform/clusters/ovh-starter/addons
            label: "OVH Addons"
          - cloud: hetzner
            addons_dir: terraform/clusters/hetzner-starter/addons
            label: "Hetzner Addons"
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Validate ${{ matrix.label }}
        id: validate
        uses: ./.github/actions/terraform-validate
        with:
          label: ${{ matrix.label }}
          path: ${{ matrix.addons_dir }}
          summary_file: ${{ env.SUMMARY_FILE }}

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-summary-addons-${{ matrix.cloud }}
          path: validation-summary-*.txt
          if-no-files-found: ignore

  validate-helm:
    name: Validate Helm Charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint ArgoCD root chart
        id: lint-argocd
        run: |
          helm lint argocd/ \
            --set repoURL="https://example.com/your-org/your-repo.git" \
            --set clusterName="lint" \
            --set domain="example.com" \
            --set letsencryptEmail="ops@example.com" \
            --set lokiBucketNames.chunks="lint-loki-chunks" \
            --set lokiBucketNames.ruler="lint-loki-ruler"

      - name: Lint demo-app chart
        id: lint-demo
        run: helm lint values/demo-app/

      - name: Lint cert-manager issuers chart
        id: lint-issuers
        run: helm lint values/cert-manager/issuers/

      - name: Lint platform-alerts chart
        id: lint-alerts
        run: helm lint values/platform-alerts/

      - name: Write Helm validation summary
        if: always()
        run: |
          if [ "${{ steps.lint-argocd.outcome }}" = "success" ] && \
             [ "${{ steps.lint-demo.outcome }}" = "success" ] && \
             [ "${{ steps.lint-issuers.outcome }}" = "success" ] && \
             [ "${{ steps.lint-alerts.outcome }}" = "success" ]; then
            echo '{"label":"Helm Charts","success":true}' > validation-summary-helm.txt
          else
            echo '{"label":"Helm Charts","success":false}' > validation-summary-helm.txt
          fi

      - name: Upload Helm summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-summary-helm
          path: validation-summary-helm.txt
          if-no-files-found: ignore

  pr-comment:
    name: Post Validation Comment
    runs-on: ubuntu-latest
    needs: [validate-cluster, validate-addons, validate-helm]
    if: always() && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download all summary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: validation-summary-*
          merge-multiple: true

      - name: Merge summary lines
        run: |
          # Collect all individual summary files into one
          touch ${{ env.SUMMARY_FILE }}
          for f in $(ls validation-summary-*.txt 2>/dev/null || true); do
            cat "$f" >> ${{ env.SUMMARY_FILE }}
          done
          # Also handle files downloaded directly as SUMMARY_FILE name
          if [ -f "terraform-validation-summary.txt" ] && [ ! -s "${{ env.SUMMARY_FILE }}" ]; then
            cp terraform-validation-summary.txt ${{ env.SUMMARY_FILE }}
          fi
        continue-on-error: true

      - name: Post PR Comment
        uses: actions/github-script@v7
        if: always()
        env:
          TERRAFORM_VALIDATION_SUMMARY_FILE: ${{ env.SUMMARY_FILE }}
        with:
          script: |
            const script = require('./.github/scripts/create-validation-comment.js');
            await script({ github, context, core });
