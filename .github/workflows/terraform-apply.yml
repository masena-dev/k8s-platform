name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      cluster:
        description: 'Cluster to target'
        required: true
        type: choice
        options:
          - ovh-starter
          - hetzner-starter
          - all
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read

env:
  TF_VERSION: "1.14.6"

jobs:
  apply-ovh:
    name: "${{ inputs.action == 'apply' && 'Apply' || 'Plan' }} - OVH Starter"
    runs-on: ubuntu-latest
    environment: production
    if: inputs.cluster == 'ovh-starter' || inputs.cluster == 'all'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init - Cluster
        working-directory: terraform/clusters/ovh-starter/cluster
        run: terraform init -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OVH_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_S3_SECRET_KEY }}

      - name: Terraform Plan - Cluster
        working-directory: terraform/clusters/ovh-starter/cluster
        run: terraform plan -no-color -input=false -out=tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OVH_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_S3_SECRET_KEY }}
          TF_VAR_ovh_application_key: ${{ secrets.OVH_APPLICATION_KEY }}
          TF_VAR_ovh_application_secret: ${{ secrets.OVH_APPLICATION_SECRET }}
          TF_VAR_ovh_consumer_key: ${{ secrets.OVH_CONSUMER_KEY }}
          TF_VAR_openstack_auth_url: ${{ secrets.OPENSTACK_AUTH_URL }}
          TF_VAR_openstack_user_name: ${{ secrets.OPENSTACK_USER_NAME }}
          TF_VAR_openstack_password: ${{ secrets.OPENSTACK_PASSWORD }}
          TF_VAR_openstack_tenant_name: ${{ secrets.OPENSTACK_TENANT_NAME }}
          TF_VAR_cluster_name: ${{ vars.OVH_CLUSTER_NAME }}
          TF_VAR_region: ${{ vars.OVH_CLUSTER_REGION }}
          TF_VAR_domain: ${{ vars.OVH_STARTER_DOMAIN }}
          TF_VAR_enable_oidc: ${{ secrets.OVH_OIDC_CLIENT_ID != '' }}
          TF_VAR_oidc_client_id: ${{ secrets.OVH_OIDC_CLIENT_ID }}

      - name: Terraform Apply - Cluster
        if: inputs.action == 'apply'
        working-directory: terraform/clusters/ovh-starter/cluster
        run: terraform apply -auto-approve tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OVH_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_S3_SECRET_KEY }}
          TF_VAR_domain: ${{ vars.OVH_STARTER_DOMAIN }}
          TF_VAR_enable_oidc: ${{ secrets.OVH_OIDC_CLIENT_ID != '' }}
          TF_VAR_oidc_client_id: ${{ secrets.OVH_OIDC_CLIENT_ID }}

      - name: Wait for Cluster Stabilization
        if: inputs.action == 'apply'
        run: |
          echo "Waiting 60 seconds for cluster to stabilize..."
          sleep 60
          echo "Cluster stabilization period completed"

      - name: Terraform Init - Addons
        working-directory: terraform/clusters/ovh-starter/addons
        run: terraform init -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OVH_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_S3_SECRET_KEY }}

      - name: Terraform Plan - Addons
        working-directory: terraform/clusters/ovh-starter/addons
        run: terraform plan -no-color -input=false -out=tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OVH_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_S3_SECRET_KEY }}
          TF_VAR_cluster_name: ${{ vars.OVH_CLUSTER_NAME }}
          TF_VAR_state_bucket: ${{ secrets.OVH_STATE_BUCKET }}
          TF_VAR_state_region: gra
          TF_VAR_state_endpoint: https://s3.gra.io.cloud.ovh.net
          TF_VAR_domain: ${{ vars.OVH_STARTER_DOMAIN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_argocd_repo_url: ${{ vars.ARGOCD_REPO_URL }}
          TF_VAR_argocd_target_revision: ${{ vars.ARGOCD_TARGET_REVISION }}
          TF_VAR_github_token: ${{ secrets.ARGOCD_GITHUB_TOKEN }}
          TF_VAR_letsencrypt_email: ${{ vars.LETSENCRYPT_EMAIL }}
          TF_VAR_cloud_provider: ovh
          TF_VAR_onepassword_service_account_token: ${{ secrets.ONEPASSWORD_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_onepassword_infra_vault_id: ${{ secrets.ONEPASSWORD_INFRA_VAULT_ID }}
          TF_VAR_onepassword_team_logins_vault_id: ${{ secrets.ONEPASSWORD_TEAM_LOGINS_VAULT_ID }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.ONEPASSWORD_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_kubectl_oidc_client_id: ${{ secrets.OVH_KUBECTL_OIDC_CLIENT_ID }}
          TF_VAR_kubectl_oidc_client_secret: ${{ secrets.OVH_KUBECTL_OIDC_CLIENT_SECRET }}
          TF_VAR_argocd_oidc_client_id: ${{ secrets.OVH_ARGOCD_OIDC_CLIENT_ID }}
          TF_VAR_argocd_oidc_client_secret: ${{ secrets.OVH_ARGOCD_OIDC_CLIENT_SECRET }}
          TF_VAR_grafana_oauth_client_id: ${{ secrets.OVH_GRAFANA_OAUTH_CLIENT_ID }}
          TF_VAR_grafana_oauth_client_secret: ${{ secrets.OVH_GRAFANA_OAUTH_CLIENT_SECRET }}
          TF_VAR_oidc_allowed_domains: ${{ vars.OVH_OIDC_ALLOWED_DOMAINS }}
          TF_VAR_oidc_admins: ${{ vars.OIDC_ADMINS || '[]' }}
          TF_VAR_oidc_viewers: ${{ vars.OIDC_VIEWERS || '[]' }}

      - name: Terraform Apply - Addons
        if: inputs.action == 'apply'
        working-directory: terraform/clusters/ovh-starter/addons
        run: terraform apply -auto-approve tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OVH_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_S3_SECRET_KEY }}
          TF_VAR_cluster_name: ${{ vars.OVH_CLUSTER_NAME }}
          TF_VAR_state_bucket: ${{ secrets.OVH_STATE_BUCKET }}
          TF_VAR_state_region: gra
          TF_VAR_state_endpoint: https://s3.gra.io.cloud.ovh.net
          TF_VAR_domain: ${{ vars.OVH_STARTER_DOMAIN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_argocd_repo_url: ${{ vars.ARGOCD_REPO_URL }}
          TF_VAR_argocd_target_revision: ${{ vars.ARGOCD_TARGET_REVISION }}
          TF_VAR_github_token: ${{ secrets.ARGOCD_GITHUB_TOKEN }}
          TF_VAR_letsencrypt_email: ${{ vars.LETSENCRYPT_EMAIL }}
          TF_VAR_cloud_provider: ovh
          TF_VAR_onepassword_service_account_token: ${{ secrets.ONEPASSWORD_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_onepassword_infra_vault_id: ${{ secrets.ONEPASSWORD_INFRA_VAULT_ID }}
          TF_VAR_onepassword_team_logins_vault_id: ${{ secrets.ONEPASSWORD_TEAM_LOGINS_VAULT_ID }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.ONEPASSWORD_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_kubectl_oidc_client_id: ${{ secrets.OVH_KUBECTL_OIDC_CLIENT_ID }}
          TF_VAR_kubectl_oidc_client_secret: ${{ secrets.OVH_KUBECTL_OIDC_CLIENT_SECRET }}
          TF_VAR_argocd_oidc_client_id: ${{ secrets.OVH_ARGOCD_OIDC_CLIENT_ID }}
          TF_VAR_argocd_oidc_client_secret: ${{ secrets.OVH_ARGOCD_OIDC_CLIENT_SECRET }}
          TF_VAR_grafana_oauth_client_id: ${{ secrets.OVH_GRAFANA_OAUTH_CLIENT_ID }}
          TF_VAR_grafana_oauth_client_secret: ${{ secrets.OVH_GRAFANA_OAUTH_CLIENT_SECRET }}
          TF_VAR_oidc_allowed_domains: ${{ vars.OVH_OIDC_ALLOWED_DOMAINS }}
          TF_VAR_oidc_admins: ${{ vars.OIDC_ADMINS || '[]' }}
          TF_VAR_oidc_viewers: ${{ vars.OIDC_VIEWERS || '[]' }}

  apply-hetzner:
    name: "${{ inputs.action == 'apply' && 'Apply' || 'Plan' }} - Hetzner Starter"
    runs-on: ubuntu-latest
    environment: production
    if: inputs.cluster == 'hetzner-starter' || inputs.cluster == 'all'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init - Cluster
        working-directory: terraform/clusters/hetzner-starter/cluster
        run: terraform init -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}

      - name: Terraform Plan - Cluster
        working-directory: terraform/clusters/hetzner-starter/cluster
        run: terraform plan -no-color -input=false -out=tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_cluster_name: ${{ vars.HETZNER_CLUSTER_NAME }}
          TF_VAR_domain: ${{ vars.HETZNER_STARTER_DOMAIN }}
          TF_VAR_ssh_public_key: ${{ secrets.HETZNER_SSH_PUBLIC_KEY }}
          TF_VAR_ssh_private_key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          TF_VAR_hcloud_ssh_key_id: ${{ secrets.HETZNER_SSH_KEY_ID }}
          TF_VAR_enable_oidc: ${{ secrets.HETZNER_OIDC_CLIENT_ID != '' }}
          TF_VAR_oidc_client_id: ${{ secrets.HETZNER_OIDC_CLIENT_ID }}

      - name: Terraform Apply - Cluster
        if: inputs.action == 'apply'
        working-directory: terraform/clusters/hetzner-starter/cluster
        run: terraform apply -auto-approve tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_domain: ${{ vars.HETZNER_STARTER_DOMAIN }}
          TF_VAR_ssh_public_key: ${{ secrets.HETZNER_SSH_PUBLIC_KEY }}
          TF_VAR_ssh_private_key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          TF_VAR_hcloud_ssh_key_id: ${{ secrets.HETZNER_SSH_KEY_ID }}
          TF_VAR_enable_oidc: ${{ secrets.HETZNER_OIDC_CLIENT_ID != '' }}
          TF_VAR_oidc_client_id: ${{ secrets.HETZNER_OIDC_CLIENT_ID }}

      - name: Wait for Cluster Stabilization
        if: inputs.action == 'apply'
        run: |
          echo "Waiting 60 seconds for cluster to stabilize..."
          sleep 60
          echo "Cluster stabilization period completed"

      - name: Terraform Init - Addons
        working-directory: terraform/clusters/hetzner-starter/addons
        run: terraform init -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}

      - name: Terraform Plan - Addons
        working-directory: terraform/clusters/hetzner-starter/addons
        run: terraform plan -no-color -input=false -out=tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          TF_VAR_cluster_name: ${{ vars.HETZNER_CLUSTER_NAME }}
          TF_VAR_state_bucket: ${{ secrets.HETZNER_STATE_BUCKET }}
          TF_VAR_state_region: fsn1
          TF_VAR_state_endpoint: ${{ secrets.HETZNER_STATE_ENDPOINT }}
          TF_VAR_domain: ${{ vars.HETZNER_STARTER_DOMAIN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_argocd_repo_url: ${{ vars.ARGOCD_REPO_URL }}
          TF_VAR_argocd_target_revision: ${{ vars.ARGOCD_TARGET_REVISION }}
          TF_VAR_github_token: ${{ secrets.ARGOCD_GITHUB_TOKEN }}
          TF_VAR_letsencrypt_email: ${{ vars.LETSENCRYPT_EMAIL }}
          TF_VAR_cloud_provider: hetzner
          TF_VAR_onepassword_service_account_token: ${{ secrets.ONEPASSWORD_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_onepassword_infra_vault_id: ${{ secrets.ONEPASSWORD_INFRA_VAULT_ID }}
          TF_VAR_onepassword_team_logins_vault_id: ${{ secrets.ONEPASSWORD_TEAM_LOGINS_VAULT_ID }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.ONEPASSWORD_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_kubectl_oidc_client_id: ${{ secrets.HETZNER_KUBECTL_OIDC_CLIENT_ID }}
          TF_VAR_kubectl_oidc_client_secret: ${{ secrets.HETZNER_KUBECTL_OIDC_CLIENT_SECRET }}
          TF_VAR_argocd_oidc_client_id: ${{ secrets.HETZNER_ARGOCD_OIDC_CLIENT_ID }}
          TF_VAR_argocd_oidc_client_secret: ${{ secrets.HETZNER_ARGOCD_OIDC_CLIENT_SECRET }}
          TF_VAR_grafana_oauth_client_id: ${{ secrets.HETZNER_GRAFANA_OAUTH_CLIENT_ID }}
          TF_VAR_grafana_oauth_client_secret: ${{ secrets.HETZNER_GRAFANA_OAUTH_CLIENT_SECRET }}
          TF_VAR_oidc_allowed_domains: ${{ vars.HETZNER_OIDC_ALLOWED_DOMAINS }}
          TF_VAR_oidc_admins: ${{ vars.OIDC_ADMINS || '[]' }}
          TF_VAR_oidc_viewers: ${{ vars.OIDC_VIEWERS || '[]' }}

      - name: Terraform Apply - Addons
        if: inputs.action == 'apply'
        working-directory: terraform/clusters/hetzner-starter/addons
        run: terraform apply -auto-approve tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          TF_VAR_cluster_name: ${{ vars.HETZNER_CLUSTER_NAME }}
          TF_VAR_state_bucket: ${{ secrets.HETZNER_STATE_BUCKET }}
          TF_VAR_state_region: fsn1
          TF_VAR_state_endpoint: ${{ secrets.HETZNER_STATE_ENDPOINT }}
          TF_VAR_domain: ${{ vars.HETZNER_STARTER_DOMAIN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_argocd_repo_url: ${{ vars.ARGOCD_REPO_URL }}
          TF_VAR_argocd_target_revision: ${{ vars.ARGOCD_TARGET_REVISION }}
          TF_VAR_github_token: ${{ secrets.ARGOCD_GITHUB_TOKEN }}
          TF_VAR_letsencrypt_email: ${{ vars.LETSENCRYPT_EMAIL }}
          TF_VAR_cloud_provider: hetzner
          TF_VAR_onepassword_service_account_token: ${{ secrets.ONEPASSWORD_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_onepassword_infra_vault_id: ${{ secrets.ONEPASSWORD_INFRA_VAULT_ID }}
          TF_VAR_onepassword_team_logins_vault_id: ${{ secrets.ONEPASSWORD_TEAM_LOGINS_VAULT_ID }}
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.ONEPASSWORD_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_kubectl_oidc_client_id: ${{ secrets.HETZNER_KUBECTL_OIDC_CLIENT_ID }}
          TF_VAR_kubectl_oidc_client_secret: ${{ secrets.HETZNER_KUBECTL_OIDC_CLIENT_SECRET }}
          TF_VAR_argocd_oidc_client_id: ${{ secrets.HETZNER_ARGOCD_OIDC_CLIENT_ID }}
          TF_VAR_argocd_oidc_client_secret: ${{ secrets.HETZNER_ARGOCD_OIDC_CLIENT_SECRET }}
          TF_VAR_grafana_oauth_client_id: ${{ secrets.HETZNER_GRAFANA_OAUTH_CLIENT_ID }}
          TF_VAR_grafana_oauth_client_secret: ${{ secrets.HETZNER_GRAFANA_OAUTH_CLIENT_SECRET }}
          TF_VAR_oidc_allowed_domains: ${{ vars.HETZNER_OIDC_ALLOWED_DOMAINS }}
          TF_VAR_oidc_admins: ${{ vars.OIDC_ADMINS || '[]' }}
          TF_VAR_oidc_viewers: ${{ vars.OIDC_VIEWERS || '[]' }}

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [apply-ovh, apply-hetzner]
    if: always()
    steps:
      - name: Write Summary
        run: |
          echo "## Terraform ${{ inputs.action == 'apply' && 'Apply' || 'Plan' }} Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action:** ${{ inputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "**Cluster:** ${{ inputs.cluster }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| OVH Starter | ${{ needs.apply-ovh.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hetzner Starter | ${{ needs.apply-hetzner.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FAILED=false
          for result in "${{ needs.apply-ovh.result }}" "${{ needs.apply-hetzner.result }}"; do
            if [ "$result" = "failure" ]; then
              FAILED=true
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo "### Status: Issues detected — check job logs above" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Status: All targeted jobs completed successfully" >> $GITHUB_STEP_SUMMARY
          fi
