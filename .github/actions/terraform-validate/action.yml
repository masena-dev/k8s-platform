name: Terraform Validate Helper
description: Run terraform init -backend=false and validate, then write a JSON summary line to a shared file.

inputs:
  label:
    description: 'Human-readable label for this component (e.g., "OVH Cluster")'
    required: true
  path:
    description: "Path to terraform directory relative to repo root"
    required: true
  summary_file:
    description: "Path to shared summary file where results will be appended"
    required: false
    default: "terraform-validation-summary.txt"

outputs:
  success:
    description: "Whether validate succeeded (true/false)"
    value: ${{ steps.validate.outputs.success }}

runs:
  using: composite
  steps:
    - name: Run Terraform Init & Validate
      id: validate
      shell: bash
      working-directory: ${{ inputs.path }}
      run: |
        set +e

        terraform init -backend=false -input=false > init-output.txt 2>&1
        init_exit=$?

        if [ $init_exit -ne 0 ]; then
          echo "success=false" >> $GITHUB_OUTPUT
          cat init-output.txt
        else
          terraform validate -no-color > validate-output.txt 2>&1
          validate_exit=$?

          if [ $validate_exit -eq 0 ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            cat validate-output.txt
          fi
        fi

    - name: Write to Summary File
      if: always()
      shell: bash
      run: |
        SAFE_LABEL=$(echo "${{ inputs.label }}" | tr ' /' '-' | tr '[:upper:]' '[:lower:]')
        SUCCESS="${{ steps.validate.outputs.success }}"
        jq -nc \
          --arg label "${{ inputs.label }}" \
          --argjson success ${SUCCESS:-false} \
          '{label: $label, success: $success}' \
          >> validation-summary-${SAFE_LABEL}.txt
