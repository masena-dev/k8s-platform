{{- range $key, $secret := .Values.secrets }}
{{- if and $secret.enabled (or $secret.onepasswordItem $secret.onepasswordItemUuid) }}
{{- $item := default $secret.onepasswordItem $secret.onepasswordItemUuid }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secret.name }}
  namespace: {{ $secret.namespace }}
spec:
  refreshInterval: {{ $.Values.refreshInterval | quote }}
  secretStoreRef:
    name: {{ $.Values.secretStoreName }}
    kind: {{ $.Values.secretStoreKind }}
  target:
    name: {{ $secret.name }}
    creationPolicy: Owner
    {{- if $secret.targetLabels }}
    template:
      metadata:
        labels:
          {{- range $labelKey, $labelValue := $secret.targetLabels }}
          {{ $labelKey }}: {{ $labelValue | quote }}
          {{- end }}
    {{- end }}
  data:
    {{- range $secret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ $item }}/{{ .remoteRef.property }}
    {{- end }}
{{- end }}
{{- end }}
