{{- if .Values.nats.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.nats.auth.tokenSecretRef.name }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
# Token should be provided via ESO (ExternalSecret) in production.
# This placeholder ensures the Secret exists for initial deployment.
stringData:
  {{ .Values.nats.auth.tokenSecretRef.key }}: "CHANGE-ME-use-external-secrets"
{{- end }}
