apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.typesense.auth.apiKeySecretRef.name }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
# API key should be provided via ESO (ExternalSecret) in production.
# This placeholder ensures the Secret exists for initial deployment.
stringData:
  {{ .Values.typesense.auth.apiKeySecretRef.key }}: "CHANGE-ME-use-external-secrets"
