{{- if .Values.dragonfly.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.dragonfly.auth.passwordSecretRef.name }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
# Password should be provided via ESO (ExternalSecret) in production.
# This placeholder ensures the Secret exists for initial deployment.
# Replace with an ExternalSecret that syncs from 1Password / AWS SM / GCP SM.
stringData:
  {{ .Values.dragonfly.auth.passwordSecretRef.key }}: "CHANGE-ME-use-external-secrets"
{{- end }}
