# 1Password item names for ovh-starter bootstrap secrets.
# In this starter kit, Terraform writes bootstrap credentials (Grafana admin, Cloudflare DNS,
# Loki S3 credentials) to 1Password so ESO can sync them into Kubernetes.
# If you prefer, you can also create these items manually — the item titles and field names
# must match what the ExternalSecrets reference.
# Item naming convention: {secret_type}-{cluster_name}
secrets:
  grafanaAdmin:
    onepasswordItem: "grafana-ovh-starter"
  grafanaOAuth:
    # Field names must be client_id / client_secret.
    enabled: false # Enabled dynamically when components.grafanaOAuth=true.
    onepasswordItem: "grafana-oidc-ovh-starter"
  lokiStorage:
    onepasswordItem: "loki-s3-ovh-starter"
  cnpgBackup:
    enabled: false
    onepasswordItem: "cnpg-backup-ovh-starter"
  cloudflareApiToken:
    onepasswordItem: "cloudflare-dns-ovh-starter"
  argocdOidc:
    # Field names must be client_id / client_secret.
    enabled: false # Set true when ArgoCD OIDC client credentials are configured.
    onepasswordItem: "argocd-oidc-ovh-starter"
  database:
    enabled: false
    onepasswordItem: "database-ovh-starter"
  alertmanagerSlackWebhook:
    enabled: false  # Set true after creating the 1Password item
    onepasswordItem: "alertmanager-slack-ovh-starter"
