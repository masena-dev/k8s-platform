# Per-cluster values overlay for the demo-app (hetzner-starter).
# The published demo image is pulled from GHCR using the bootstrap secret that
# addons Terraform seeds in the demo namespace.
ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production

imagePullSecrets:
  - name: ghcr-secret

# Demo app consumes the normalized app secret contract in its own namespace.
# Addons Terraform seeds `database-credentials`, and ESO can keep it in sync later.
databaseSecret:
  enabled: false
