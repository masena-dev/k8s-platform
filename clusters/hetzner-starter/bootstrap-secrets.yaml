# 1Password item names for hetzner-starter bootstrap secrets.
# In this starter kit, Terraform writes bootstrap credentials (Grafana admin,
# Cloudflare DNS, Loki S3 credentials) to 1Password so ESO can sync them into
# Kubernetes.
# Item naming convention: {secret_type}-{cluster_name}
secrets:
  grafanaAdmin:
    onepasswordItem: "grafana-hetzner-starter"
  lokiStorage:
    onepasswordItem: "loki-s3-hetzner-starter"
  cnpgBackup:
    enabled: false
    onepasswordItem: "cnpg-backup-hetzner-starter"
  cloudflareApiToken:
    onepasswordItem: "cloudflare-dns-hetzner-starter"
  database:
    enabled: false
    onepasswordItem: "database-hetzner-starter"
  alertmanagerSlackWebhook:
    enabled: false  # Set true after creating the 1Password item
    onepasswordItem: "alertmanager-slack-hetzner-starter"
